<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasFlow | Design Dashboard</title>
    
    <!-- 1. Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Tailwind Configuration for Custom Colors -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0f172a', // Main Background
                            800: '#1e293b', // Sidebar/Cards
                            700: '#334155', // Borders
                            600: '#475569', // Input Borders
                        },
                        brand: {
                            500: '#6366f1', // Primary (Indigo)
                            600: '#4f46e5', // Primary Hover
                        }
                    }
                }
            }
        }
    </script>

    <!-- 3. Google AdSense Script Placeholder -->
    <!--

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXX"
     crossorigin="anonymous"></script>

    <!-- 4. Custom Styles & Animations -->
    <style>
        /* Custom Scrollbars */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Tab Content Animations */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }
        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sidebar Navigation Active State */
        .nav-item.active {
            background-color: rgba(55, 65, 81, 0.5);
            color: #6366f1;
            border-right: 2px solid #6366f1;
        }
    </style>
</head>

<!-- 5. Body Layout -->
<body class="bg-dark-900 text-gray-300 font-sans antialiased h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-dark-800 border-r border-dark-700 flex flex-col hidden md:flex z-20">
        
        <!-- Logo Area -->
        <div class="h-16 flex items-center justify-center border-b border-dark-700">
            <h1 class="text-2xl font-bold text-white tracking-wider uppercase flex items-center gap-2">
                <svg class="w-8 h-8 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                CanvasFlow
            </h1>
        </div>

        <!-- Navigation Menu -->
        <nav class="flex-1 py-6 space-y-1" id="sidebar-nav">
            <!-- Tab 1: Workspace -->
            <button onclick="switchTab('workspace', this)" id="btn-workspace" class="nav-item active w-full flex items-center gap-3 px-6 py-3 text-gray-400 hover:bg-dark-700 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                Design Workspace
            </button>

            <!-- Tab 2: Templates -->
            <button onclick="switchTab('templates', this)" id="btn-templates" class="nav-item w-full flex items-center gap-3 px-6 py-3 text-gray-400 hover:bg-dark-700 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"></path></svg>
                Templates
            </button>

            <!-- Tab 3: Analytics -->
            <button onclick="switchTab('analytics', this)" id="btn-analytics" class="nav-item w-full flex items-center gap-3 px-6 py-3 text-gray-400 hover:bg-dark-700 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                My Analytics
            </button>

            <!-- Tab 4: Settings -->
            <button onclick="switchTab('settings', this)" id="btn-settings" class="nav-item w-full flex items-center gap-3 px-6 py-3 text-gray-400 hover:bg-dark-700 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Settings
            </button>
        </nav>

        <!-- User Profile Footer -->
        <div class="p-4 border-t border-dark-700">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-brand-600 flex items-center justify-center text-white font-bold shadow-lg">JD</div>
                <div>
                    <p class="text-sm text-white font-semibold">John Doe</p>
                    <p class="text-xs text-gray-500">Pro Plan</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col h-full relative w-full">
        
        <!-- Header -->
        <header class="h-16 bg-dark-800 border-b border-dark-700 flex items-center justify-between px-6 z-10">
            <!-- Mobile Menu Button -->
            <button class="md:hidden text-gray-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>

            <!-- Search Bar -->
            <div class="hidden md:flex items-center bg-dark-900 rounded-lg px-3 py-2 border border-dark-700 w-96 shadow-inner">
                <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" placeholder="Search designs..." class="bg-transparent border-none focus:outline-none text-sm ml-2 w-full text-gray-200 placeholder-gray-600">
            </div>

            <!-- Header Actions -->
            <div class="flex items-center gap-4">
                <button class="p-2 rounded-full bg-dark-700 text-gray-400 hover:text-white relative transition">
                    <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-dark-800"></span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v1m6 0H9"></path></svg>
