        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Tab Transitions */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Active Sidebar Link Styling */
        .nav-btn.active {
            @apply bg-dark-700/50 text-brand-500 border-r-2 border-brand-500;
        }

<body class="bg-dark-900 text-gray-300 font-sans antialiased h-screen flex overflow-hidden">

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col h-full relative w-full">
        
        <header class="h-16 bg-dark-800 border-b border-dark-700 flex items-center justify-between px-6">
            <button class="md:hidden text-gray-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div class="hidden md:flex items-center bg-dark-900 rounded-lg px-3 py-2 border border-dark-700 w-96">
                <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" placeholder="Search..." class="bg-transparent border-none focus:outline-none text-sm ml-2 w-full text-gray-200 placeholder-gray-600">
            </div>
            <div class="flex items-center gap-4">
                <button class="p-2 rounded-full bg-dark-700 text-gray-400 hover:text-white relative">
                    <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v1m6 0H9"></path></svg>

        <main class="flex-1 overflow-y-auto p-6 relative">

            <!-- 1. DESIGN WORKSPACE TAB -->
            <section id="workspace" class="tab-content active space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl text-white font-bold">Design Workspace</h2>
                    <div class="flex gap-2">
                        <button class="px-4 py-2 bg-brand-600 hover:bg-brand-500 text-white rounded-lg text-sm font-semibold transition">Save Changes</button>
                        <button class="px-4 py-2 bg-dark-700 hover:bg-dark-600 text-white rounded-lg text-sm font-semibold transition">Export</button>
                    </div>
                </div>

                <!-- Canvas Area Mockup -->
                <div class="bg-dark-800 rounded-xl border border-dark-700 p-8 h-[500px] flex items-center justify-center relative overflow-hidden">
                    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-5"></div>
                    <div class="bg-white w-[400px] h-[300px] shadow-2xl rounded flex items-center justify-center text-gray-900 font-bold text-xl relative transform transition hover:scale-[1.01]">
                        Canvas Preview
                        <div class="absolute -top-10 left-10 bg-brand-600 text-white text-xs py-1 px-2 rounded">
                            Active Layer
                        </div>
                    </div>
                </div>
                
                <!-- Toolbar Mockup -->
                <div class="flex gap-4 overflow-x-auto pb-2">
                    <button class="p-3 bg-dark-800 rounded border border-dark-700 hover:border-brand-500 text-white">Move</button>
                    <button class="p-3 bg-dark-800 rounded border border-dark-700 hover:border-brand-500 text-white">Text</button>
                    <button class="p-3 bg-dark-800 rounded border border-dark-700 hover:border-brand-500 text-white">Image</button>
                    <button class="p-3 bg-dark-800 rounded border border-dark-700 hover:border-brand-500 text-white">Shape</button>
                </div>
            </section>

            <!-- 2. TEMPLATES TAB -->
            <section id="templates" class="tab-content space-y-6">
                <h2 class="text-2xl text-white font-bold">Templates</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Card 1 -->
                    <div class="bg-dark-800 rounded-xl overflow-hidden border border-dark-700 hover:border-brand-500 transition cursor-pointer group">
                        <div class="h-40 bg-gray-700 group-hover:bg-gray-600 transition flex items-center justify-center text-gray-400">
